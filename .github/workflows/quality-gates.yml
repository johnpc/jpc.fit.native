name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  SCHEME: jpc.fit.native
  DESTINATION: "platform=iOS Simulator,name=iPhone 17 Pro"

jobs:
  lint:
    name: Source Line Limit + Gherkin Sync
    runs-on: macos-26-xlarge
    steps:
      - uses: actions/checkout@v5
      - name: Source file line limit (≤100)
        run: bash scripts/check_line_limit.sh
      - name: Acceptance tests in sync with .feature files
        run: python3 scripts/generate_acceptance_tests.py --check

  build:
    name: Build
    runs-on: macos-26-xlarge
    steps:
      - uses: actions/checkout@v5
      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath DerivedData \
            -quiet
      - name: Cache DerivedData
        uses: actions/cache/save@v5
        with:
          path: DerivedData
          key: derived-data-${{ github.sha }}

  unit-tests:
    name: Unit Tests + Coverage
    runs-on: macos-26-xlarge
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache/restore@v5
        with:
          path: DerivedData
          key: derived-data-${{ github.sha }}
      - name: Run unit tests
        run: |
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath DerivedData \
            -only-testing:"jpc.fit.nativeTests" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            -quiet
      - name: Check coverage ≥ 80%
        run: |
          xcrun xccov view --report --json TestResults.xcresult > coverage.json
          python3 scripts/coverage_check.py coverage.json
      - name: Upload coverage results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult

  crap-analysis:
    name: CRAP Score ≤ 30
    runs-on: macos-26-xlarge
    needs: unit-tests
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
      - name: Calculate CRAP scores
        run: |
          xcrun xccov view --report --json TestResults.xcresult > coverage.json
          python3 scripts/crap_check.py coverage.json

  acceptance-tests:
    name: Acceptance Tests (Gherkin)
    runs-on: macos-26-xlarge
    needs: build
    timeout-minutes: 40
    env:
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      - name: Verify generated acceptance tests match .feature files
        run: python3 scripts/generate_acceptance_tests.py --check
      - name: Run acceptance tests (retry failed, then full suite)
        run: |
          RESULT_PATH=/tmp/AcceptanceResults.xcresult
          rm -rf "$RESULT_PATH"
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -only-testing:"jpc.fit.nativeUITests/AcceptanceTests" \
            -resultBundlePath "$RESULT_PATH" \
            -quiet && exit 0

          echo "⚠️ Some tests failed, retrying only failed tests..."
          FAILED=$(xcrun xcresulttool get test-results tests --path "$RESULT_PATH" 2>/dev/null \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for node in data.get('testNodes', []):
            for child in node.get('children', []):
              for test in child.get('children', []):
                if test.get('result') == 'Failed':
                  print(f\"jpc.fit.nativeUITests/{child['name']}/{test['name']}\")
          ")

          if [ -n "$FAILED" ]; then
            RETRY_ARGS=""
            for t in $FAILED; do
              echo "  Retrying: $t"
              RETRY_ARGS="$RETRY_ARGS -only-testing:$t"
            done
            sleep 5
            xcodebuild test \
              -scheme "$SCHEME" \
              -destination "$DESTINATION" \
              $RETRY_ARGS \
              -quiet && exit 0
          fi

          echo "⚠️ Targeted retry failed, retrying full suite..."
          sleep 5
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -only-testing:"jpc.fit.nativeUITests/AcceptanceTests" \
            -quiet

  deploy:
    name: Deploy to App Store Connect
    runs-on: macos-26-xlarge
    needs: [unit-tests, crap-analysis, acceptance-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.ASC_KEY_CONTENT }}" > ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
      - name: Increment build number
        run: |
          BUILD_NUM=$(date +%Y%m%d%H%M)
          agvtool new-version -all $BUILD_NUM
      - name: Archive and upload (auto-bump version on conflict)
        run: |
          upload() {
            xcodebuild archive \
              -scheme "$SCHEME" \
              -destination "generic/platform=iOS" \
              -archivePath ~/Desktop/jpc.fit.native.xcarchive \
              -allowProvisioningUpdates \
              -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
              -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
              -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
              -quiet

            cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>destination</key>
              <string>upload</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>teamID</key>
              <string>${{ secrets.TEAM_ID }}</string>
          </dict>
          </plist>
          PLIST

            xcodebuild -exportArchive \
              -archivePath ~/Desktop/jpc.fit.native.xcarchive \
              -exportOptionsPlist /tmp/ExportOptions.plist \
              -exportPath ~/Desktop/export \
              -allowProvisioningUpdates \
              -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
              -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
              -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} 2>&1
          }

          OUTPUT=$(upload) && echo "$OUTPUT" && exit 0

          if echo "$OUTPUT" | grep -qi "version.*already exists\|already been uploaded\|redundant binary\|train.*closed\|higher version"; then
            echo "⚠️ Version conflict detected, bumping minor version..."
            CURRENT=$(grep 'MARKETING_VERSION' jpc.fit.native.xcodeproj/project.pbxproj | head -1 | sed 's/.*= *\(.*\);/\1/')
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            NEW_VERSION="${MAJOR}.$((MINOR + 1))"
            sed -i '' "s/MARKETING_VERSION = ${CURRENT}/MARKETING_VERSION = ${NEW_VERSION}/g" jpc.fit.native.xcodeproj/project.pbxproj
            echo "Bumped $CURRENT → $NEW_VERSION"

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Bump version to $NEW_VERSION [skip ci]"
            git push

            rm -rf ~/Desktop/jpc.fit.native.xcarchive
            OUTPUT=$(upload)
            echo "$OUTPUT"
          else
            echo "$OUTPUT"
            exit 1
          fi
